<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大学生活英语·60天特训营</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#12172B;
  --panel:#1B2140;
  --panel-2:#242B58;
  --cream:#F5F1E6;
  --ink:#2A2520;
  --yellow:#FFC94A;
  --mint:#4ADE9E;
  --coral:#FF6B6B;
  --muted:#8A92BE;
  --line: rgba(245,241,230,0.14);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:
    radial-gradient(1200px 600px at 90% -10%, rgba(255,201,74,0.08), transparent 60%),
    radial-gradient(900px 500px at -10% 110%, rgba(74,222,158,0.07), transparent 60%),
    var(--bg);
  color:var(--cream);
  font-family:'Sora',system-ui,-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
  min-height:100vh;
  padding-bottom:60px;
}
.mono{font-family:'Space Mono',monospace;}
.app{max-width:920px;margin:0 auto;padding:20px 18px 0;}

/* ---------- header ---------- */
header.topbar{
  display:flex;justify-content:space-between;align-items:flex-start;
  gap:14px;flex-wrap:wrap;margin-bottom:18px;
}
.brand{display:flex;flex-direction:column;gap:4px;}
.brand .eyebrow{
  font-family:'Space Mono',monospace;font-size:11px;letter-spacing:3px;
  color:var(--yellow);text-transform:uppercase;
}
.brand h1{margin:0;font-size:22px;font-weight:800;letter-spacing:-0.3px;}
.brand p{margin:0;color:var(--muted);font-size:13px;}
.stats-strip{display:flex;gap:10px;flex-wrap:wrap;}
.stat-pill{
  background:var(--panel);border:1px solid var(--line);border-radius:12px;
  padding:8px 14px;text-align:center;min-width:74px;
}
.stat-pill .num{font-family:'Space Mono',monospace;font-size:18px;font-weight:700;color:var(--yellow);}
.stat-pill.mint .num{color:var(--mint);}
.stat-pill .lbl{font-size:10.5px;color:var(--muted);letter-spacing:0.5px;margin-top:2px;}

/* ---------- day strip ---------- */
.section-label{
  font-family:'Space Mono',monospace;font-size:11px;letter-spacing:2px;
  color:var(--muted);text-transform:uppercase;margin:18px 2px 8px;
  display:flex;justify-content:space-between;align-items:center;
}
.section-label button{
  font-family:'Sora';font-size:12px;background:none;border:1px solid var(--line);
  color:var(--muted);padding:4px 10px;border-radius:20px;cursor:pointer;
}
.section-label button:hover{color:var(--cream);border-color:var(--muted);}
.day-strip{
  display:flex;gap:8px;overflow-x:auto;padding:4px 2px 10px;
  scrollbar-width:thin;
}
.day-strip::-webkit-scrollbar{height:6px;}
.day-strip::-webkit-scrollbar-thumb{background:var(--panel-2);border-radius:6px;}
.day-chip{
  flex:0 0 auto;width:46px;height:58px;border-radius:9px;
  background:var(--panel);border:1px solid var(--line);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;position:relative;transition:transform .12s ease, border-color .12s ease;
}
.day-chip:hover{transform:translateY(-2px);border-color:var(--muted);}
.day-chip .d{font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);}
.day-chip .n{font-family:'Space Mono',monospace;font-size:16px;font-weight:700;}
.day-chip .dot{width:6px;height:6px;border-radius:50%;margin-top:4px;background:var(--muted);opacity:0.5;}
.day-chip.active{background:var(--yellow);border-color:var(--yellow);}
.day-chip.active .d,.day-chip.active .n{color:#2A2109;}
.day-chip.done .dot{background:var(--mint);opacity:1;}
.day-chip.progress .dot{background:var(--yellow);opacity:1;}

/* ---------- mode tabs ---------- */
.mode-tabs{display:flex;gap:8px;margin:6px 2px 4px;flex-wrap:wrap;}
.mode-tab{
  font-family:'Sora';font-size:13px;font-weight:600;color:var(--muted);
  background:var(--panel);border:1px solid var(--line);border-radius:10px;
  padding:9px 14px;cursor:pointer;display:flex;align-items:center;gap:6px;
}
.mode-tab.active{background:var(--panel-2);color:var(--cream);border-color:var(--mint);}
.mode-hint{color:var(--muted);font-size:12.5px;margin:6px 4px 16px;}

/* ---------- ticket card ---------- */
.ticket-wrap{margin:8px 2px 18px;}
.ticket{
  position:relative;display:flex;min-height:290px;border-radius:18px;overflow:hidden;
  background:var(--cream);color:var(--ink);
  box-shadow:0 24px 50px rgba(0,0,0,0.38);
}
.ticket-stub{
  width:78px;flex:0 0 auto;position:relative;
  background:linear-gradient(165deg,#2E366B,#1B2140);color:var(--cream);
  display:flex;flex-direction:column;align-items:center;justify-content:space-between;
  padding:18px 6px;border-right:2px dashed rgba(42,37,32,0.28);
}
.ticket-stub::before,.ticket-stub::after{
  content:"";position:absolute;width:22px;height:22px;background:var(--bg);
  border-radius:50%;right:-11px;z-index:2;
}
.ticket-stub::before{top:-11px;}
.ticket-stub::after{bottom:-11px;}
.stub-top{font-family:'Space Mono',monospace;font-size:10.5px;color:var(--yellow);letter-spacing:1px;text-align:center;}
.stub-topic{
  writing-mode:vertical-rl;letter-spacing:3px;font-family:'Space Mono',monospace;
  font-size:12.5px;font-weight:700;flex:1;display:flex;align-items:center;justify-content:center;margin:8px 0;
}
.stub-progress{font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);}
.ticket-body{flex:1;padding:26px 26px 20px;display:flex;flex-direction:column;min-width:0;}
.prompt-label{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:2px;color:#9A9382;text-transform:uppercase;margin-bottom:8px;}
.prompt-text{font-size:20px;font-weight:700;line-height:1.5;margin-bottom:6px;}
.prompt-sub{font-size:13.5px;color:#7A7364;margin-bottom:18px;}
.answer-area{margin-top:auto;}
.text-input{
  width:100%;padding:13px 14px;border-radius:10px;border:2px solid #E4DCC8;
  font-family:'Sora';font-size:15.5px;background:#FFFDF7;color:var(--ink);
}
.text-input:focus{outline:none;border-color:#2A2520;}
.text-input.correct{border-color:var(--mint);background:#EAFBF3;}
.text-input.wrong{border-color:var(--coral);background:#FFECEC;}
.mc-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.mc-opt{
  text-align:left;padding:12px 14px;border-radius:10px;border:2px solid #E4DCC8;
  background:#FFFDF7;color:var(--ink);font-family:'Sora';font-size:14px;cursor:pointer;line-height:1.4;
}
.mc-opt:hover{border-color:#B9AE8E;}
.mc-opt.correct{border-color:var(--mint);background:#EAFBF3;}
.mc-opt.wrong{border-color:var(--coral);background:#FFECEC;}
.scramble-tokens,.scramble-answer{display:flex;flex-wrap:wrap;gap:8px;min-height:44px;}
.scramble-answer{padding:10px;border:2px dashed #C9BE9E;border-radius:10px;margin-bottom:10px;background:#FFFDF7;}
.token{
  padding:8px 12px;border-radius:8px;background:#2A2520;color:var(--cream);
  font-size:14px;cursor:pointer;font-family:'Sora';user-select:none;
}
.token.used{opacity:0.25;pointer-events:none;}
.token.placed{background:#E4DCC8;color:#2A2520;}
.correct-reveal{font-size:13.5px;margin-top:10px;padding:10px 12px;border-radius:8px;background:#F0ECDD;color:#5B5340;line-height:1.5;}
.correct-reveal b{color:#1F6B4A;}
.card-actions{display:flex;gap:10px;margin-top:16px;align-items:center;}
.btn{
  font-family:'Sora';font-weight:700;font-size:14.5px;border:none;border-radius:10px;
  padding:12px 20px;cursor:pointer;
}
.btn.primary{background:var(--ink);color:var(--cream);}
.btn.primary:hover{background:#3a342b;}
.btn.ghost{background:transparent;color:#7A7364;border:1px solid #D9CFB6;}
.btn.ghost:hover{color:#2A2520;}
.icon-btn{
  width:42px;height:42px;border-radius:10px;border:1px solid #D9CFB6;background:#FFFDF7;
  cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;flex:0 0 auto;
}
.icon-btn:hover{background:#F0ECDD;}

/* ---------- footer / progress ---------- */
.session-bar{
  display:flex;align-items:center;gap:12px;margin:0 2px 8px;
}
.progress-track{flex:1;height:8px;border-radius:6px;background:var(--panel-2);overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--yellow),var(--mint));width:0%;transition:width .3s ease;}
.session-count{font-family:'Space Mono',monospace;font-size:12.5px;color:var(--muted);white-space:nowrap;}
.footer-actions{display:flex;justify-content:space-between;align-items:center;margin:4px 2px 20px;flex-wrap:wrap;gap:8px;}
.link-btn{background:none;border:none;color:var(--muted);font-size:12.5px;cursor:pointer;text-decoration:underline;}
.link-btn:hover{color:var(--cream);}

.done-panel{
  text-align:center;padding:50px 20px;background:var(--cream);color:var(--ink);border-radius:18px;
  box-shadow:0 24px 50px rgba(0,0,0,0.38);
}
.done-panel h2{margin:0 0 8px;font-size:22px;}
.done-panel p{margin:0 0 18px;color:#7A7364;font-size:14px;}

.intro{
  background:var(--panel);border:1px solid var(--line);border-radius:14px;
  padding:14px 16px;margin-bottom:16px;font-size:13px;color:var(--muted);line-height:1.6;
}
.intro b{color:var(--cream);}

/* ---------- vocab / build / critical modes ---------- */
.vocab-card{
  border:2px dashed #D9CFB6;border-radius:12px;padding:20px;text-align:center;
  cursor:pointer;background:#FFFDF7;
}
.vocab-front{font-size:22px;font-weight:800;}
.vocab-sub{color:#9A9382;font-size:12.5px;margin-top:6px;}
.vocab-back{display:none;margin-top:14px;padding-top:14px;border-top:1px dashed #D9CFB6;}
.vocab-back.show{display:block;}
.vocab-example{font-size:13px;color:#7A7364;margin-top:8px;line-height:1.5;}
.priority-tag{
  display:inline-block;font-family:'Space Mono',monospace;font-size:10.5px;
  padding:2px 8px;border-radius:20px;margin-left:8px;vertical-align:middle;
}
.priority-high{background:rgba(255,107,107,0.18);color:#FF9B9B;}
.priority-med{background:rgba(255,201,74,0.18);color:var(--yellow);}
.priority-low{background:rgba(74,222,158,0.18);color:var(--mint);}
.self-assess{display:flex;gap:10px;margin-top:14px;}
.self-assess .btn{flex:1;}
.build-target{
  display:inline-block;background:#2A2520;color:var(--cream);padding:5px 12px;
  border-radius:8px;font-weight:700;margin:6px 0 14px;
}
textarea.text-input{resize:vertical;min-height:80px;font-family:'Sora';}

/* ---------- report panel ---------- */
.report-panel{
  background:var(--cream);color:var(--ink);border-radius:18px;padding:24px 26px;
  box-shadow:0 24px 50px rgba(0,0,0,0.38);
}
.report-panel h2{margin:0 0 4px;font-size:19px;}
.report-panel .sub{color:#7A7364;font-size:12.5px;margin-bottom:18px;}
.report-block{margin-bottom:22px;}
.report-block h3{
  font-family:'Space Mono',monospace;font-size:11px;letter-spacing:2px;
  text-transform:uppercase;color:#9A9382;margin:0 0 10px;
}
.report-row{display:flex;align-items:center;gap:10px;margin-bottom:7px;}
.report-name{width:96px;flex:0 0 auto;font-size:12.5px;}
.report-track{flex:1;height:7px;border-radius:6px;background:#E9E2CE;overflow:hidden;}
.report-fill{height:100%;background:linear-gradient(90deg,#2A2520,#5B5340);}
.report-pct{width:56px;flex:0 0 auto;text-align:right;font-size:11.5px;color:#7A7364;}
.report-summary{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:6px;}
.report-chip{
  background:#FFFDF7;border:1px solid #E4DCC8;border-radius:10px;padding:8px 14px;text-align:center;min-width:90px;
}
.report-chip .num{font-family:'Space Mono',monospace;font-size:18px;font-weight:700;}
.report-chip .lbl{font-size:10.5px;color:#9A9382;margin-top:2px;}

@media (max-width:560px){
  .ticket{flex-direction:column;}
  .ticket-stub{width:100%;flex-direction:row;border-right:none;border-bottom:2px dashed rgba(42,37,32,0.28);padding:10px 16px;}
  .ticket-stub::before,.ticket-stub::after{top:auto;right:auto;}
  .ticket-stub::before{left:-11px;top:50%;transform:translateY(-50%);}
  .ticket-stub::after{right:-11px;left:auto;top:50%;transform:translateY(-50%);}
  .stub-topic{writing-mode:horizontal-tb;margin:0 10px;}
  .mc-grid{grid-template-columns:1fr;}
  .brand h1{font-size:19px;}
}
</style>
</head>
<body>
<div class="app" id="app">

  <header class="topbar">
    <div class="brand">
      <div class="eyebrow">Campus English · Boarding Pass</div>
      <h1>大学生活英语 · 60天特训营</h1>
      <p>覆盖迎新、选课、宿舍、考试、实习到毕业的真实场景语料</p>
    </div>
    <div class="stats-strip">
      <div class="stat-pill"><div class="num mono" id="statStreak">0</div><div class="lbl">连续天数</div></div>
      <div class="stat-pill mint"><div class="num mono" id="statMastered">0</div><div class="lbl">已掌握</div></div>
      <div class="stat-pill"><div class="num mono" id="statTotal">0</div><div class="lbl">语料总量</div></div>
    </div>
  </header>

  <div class="intro">
    每天一张<b>登机牌任务卡</b>，7种模式循环轰炸同一场景：<b>中译英/选择题/完形填空/乱序拼句</b>练句子输出与反应，<b>重点词汇</b>练高频表达记忆，<b>造句实战</b>练遣词造句，<b>思辨表达</b>练英文批判性思维。系统按场景、按优先级追踪每一句/每个词的掌握情况，错得越多的句子会自动排到"优先错题本"最前面。点击右下角"训练报告"查看全景数据。
  </div>

  <div class="section-label">60天行程<span class="mono" id="dayLabel">DAY 01 / 60</span></div>

    <button class="link-btn" id="reportBtn">📊 训练报告</button>
    <button class="link-btn" id="resetBtn">重置今日进度</button>
  </div>

</div>

<script>
/* ============ 0. 存储垫片：脱离 Claude 环境时自动改用浏览器原生 localStorage ============ */
if(!window.storage){
  window.storage = {
    async get(key, shared){
      const k=(shared?"shared:":"")+key;
      const v=localStorage.getItem(k);
      return v!==null ? {key, value:v, shared:!!shared} : null;
    },
    async set(key, value, shared){
      const k=(shared?"shared:":"")+key;
      localStorage.setItem(k, value);
      return {key, value, shared:!!shared};
    },
    async delete(key, shared){
      const k=(shared?"shared:":"")+key;
      localStorage.removeItem(k);
      return {key, deleted:true, shared:!!shared};
    },
    async list(prefix, shared){
      const marker=(shared?"shared:":"");
      const keys=[];
      for(let i=0;i<localStorage.length;i++){
        const raw=localStorage.key(i);
        if(!raw.startsWith(marker)) continue;
        const k=raw.slice(marker.length);
        if(!prefix || k.startsWith(prefix)) keys.push(k);
      }
      return {keys, prefix, shared:!!shared};
    }
  };
}

/* ============ 2. 语料生成与60天分配 ============ */
function cap(s){return s.charAt(0).toUpperCase()+s.slice(1);}
function escapeRegExp(s){return s.replace(/[.*+?^${}()|[\]\\]/g,"\\$&");}

function buildCorpus(){
  let id=1; const corpus=[];
  const perTopic=Math.ceil(5000/TOPICS.length);
  TOPICS.forEach((topic)=>{
    const T=topic.templates.length,A=topic.A.length,B=topic.B.length;
    const totalCombos=T*A*B;
    const n=Math.min(perTopic, totalCombos);
    for(let idx=0; idx<n; idx++){
      const ti=idx%T;
      const ai=Math.floor(idx/T)%A;
      const bi=Math.floor(idx/(T*A))%B;
      const tmpl=topic.templates[ti], a=topic.A[ai], b=topic.B[bi];
      let en=tmpl.en.split("{A}").join(a[0]).split("{B}").join(b[0]);
      let zh=tmpl.zh.split("{A}").join(a[1]).split("{B}").join(b[1]);
      en=cap(en);
      corpus.push({id:id++, topicKey:topic.key, topicName:topic.name, en, zh});
    }
  });
  return corpus;
}

function distributeDays(corpus, totalDays){
  const byTopic={};
  corpus.forEach(s=>{(byTopic[s.topicKey]=byTopic[s.topicKey]||[]).push(s);});
  const topicKeys=Object.keys(byTopic);
  const interleaved=[];
  let i=0, more=true;
  while(more){
    more=false;
    for(const k of topicKeys){
      const arr=byTopic[k];
      if(i<arr.length){interleaved.push(arr[i]); more=true;}
    }
    i++;
  }
  const perDay=Math.ceil(interleaved.length/totalDays);
  const pools={};
  for(let d=1; d<=totalDays; d++){
    pools[d]=interleaved.slice((d-1)*perDay, d*perDay);
  }
  return pools;
}

const TOTAL_DAYS=60;
const CORPUS=buildCorpus();
const corpusById={};
CORPUS.forEach(s=>corpusById[s.id]=s);
const DAY_POOLS=distributeDays(CORPUS, TOTAL_DAYS);

/* ============ 3. 持久化进度 ============ */
async function loadProgress(){
  try{
    const res=await window.storage.get("progress-v1", false);
    if(res && res.value) return JSON.parse(res.value);
  }catch(e){}
  return {masteredIds:{}, mistakeIds:[], stats:{}, buildCount:0, criticalCount:0, streak:0, lastActiveDate:"", currentDay:1, currentMode:"translate"};
}
function saveProgress(){
  try{ window.storage.set("progress-v1", JSON.stringify(progress), false).catch(()=>{}); }catch(e){}
}
function todayStr(){ return new Date().toISOString().slice(0,10); }
function touchStreak(){
  const today=todayStr();
  if(progress.lastActiveDate===today) return;
  const y=new Date(Date.now()-86400000).toISOString().slice(0,10);
  progress.streak = (progress.lastActiveDate===y) ? (progress.streak||0)+1 : 1;
  progress.lastActiveDate=today;
  saveProgress();
}

/* ============ 4. 应用状态 ============ */
let progress=null;
const MODES=[
  {key:"translate",label:"✍️ 中译英",hint:"读中文提示，输入完整的英文句子，回车检查。"},
  {key:"mc",label:"🔘 选择题",hint:"根据中文提示，从四个选项中选出正确的英文句子。"},
  {key:"cloze",label:"🕳️ 完形填空",hint:"补全句子中缺失的单词，拼写要完全正确。"},
  {key:"scramble",label:"🧩 乱序拼句",hint:"点击单词块，按正确语序重新拼出句子。"},
  {key:"vocab",label:"📚 重点词汇",hint:"点卡片翻面，记住该场景的高频表达，自评是否掌握。"},
  {key:"build",label:"🛠️ 造句实战",hint:"用给定词汇自己造一句英文，再对照参考例句，练遣词造句。"},
  {key:"critical",label:"🧠 思辨表达",hint:"用英文回答一个开放性问题，参考角度学习批判性思维的表达方式。"}
];
let session={day:1, mode:"translate", isMistakeMode:false, queue:[], total:0, correct:0, wrong:0, current:null, extra:null, answered:false};
let reportOpen=false;

/* ============ 5. 渲染：顶部统计 / 天数条 / 模式条 ============ */
function renderStats(){
  document.getElementById("statStreak").textContent=progress.streak||0;
  document.getElementById("statMastered").textContent=Object.keys(progress.masteredIds).length;
  document.getElementById("statTotal").textContent=CORPUS.length;
  document.getElementById("mistakeCount").textContent=(progress.mistakeIds||[]).length;
}

function dayStatus(d){
  const pool=DAY_POOLS[d]||[];
  if(pool.length===0) return "empty";
  const masteredCount=pool.filter(s=>progress.masteredIds[s.id]).length;
  if(masteredCount===0) return "todo";
  if(masteredCount===pool.length) return "done";
  return "progress";
}

function renderDayStrip(){
  const strip=document.getElementById("dayStrip");
  let html="";
  for(let d=1; d<=TOTAL_DAYS; d++){
    const st=dayStatus(d);
    const cls=["day-chip"];
    if(d===session.day) cls.push("active");
    if(st==="done") cls.push("done");
    if(st==="progress") cls.push("progress");
    html+=`<div class="${cls.join(' ')}" data-day="${d}">
      <div class="d">DAY</div><div class="n mono">${String(d).padStart(2,'0')}</div><div class="dot"></div>
    </div>`;
  }
  strip.innerHTML=html;
  document.getElementById("dayLabel").textContent=`DAY ${String(session.day).padStart(2,'0')} / ${TOTAL_DAYS}`;
}

function renderModeTabs(){
  const wrap=document.getElementById("modeTabs");
  wrap.innerHTML=MODES.map(m=>`<div class="mode-tab ${m.key===session.mode?'active':''}" data-mode="${m.key}">${m.label}</div>`).join("");
  const hint=MODES.find(m=>m.key===session.mode);
  document.getElementById("modeHint").textContent=hint?hint.hint:"";
}

/* ============ 6. 会话逻辑 ============ */
function topicsOfDay(day){
  const set=new Set();
  (DAY_POOLS[day]||[]).forEach(s=>set.add(s.topicKey));
  return Array.from(set);
}
function vocabPoolForDay(day){
  const keys=topicsOfDay(day);
  const items=[];
  TOPICS.forEach(t=>{
    if(!keys.includes(t.key)) return;
    t.A.forEach((pair,i)=>{
      items.push({id:"vocab:"+t.key+":"+i, topicKey:t.key, topicName:t.name, phrase:pair[0], zh:pair[1]});
    });
  });
  return items;
}
function buildPoolForDay(day){
  const keys=topicsOfDay(day);
  const items=[];
  TOPICS.forEach(t=>{
    if(!keys.includes(t.key)) return;
    t.A.forEach((pair,i)=>{
      items.push({id:"build:"+t.key+":"+i, topicKey:t.key, topicName:t.name, phrase:pair[0], zh:pair[1]});
    });
  });
  return items;
}
function criticalPoolForDay(day){
  const keys=topicsOfDay(day);
  return keys.filter(k=>CRITICAL_PROMPTS[k]).map(k=>{
    const t=TOPICS.find(tt=>tt.key===k);
    const c=CRITICAL_PROMPTS[k];
    return {id:"critical:"+k, topicKey:k, topicName:t.name, en:c.en, zh:c.zh, model:c.model};
  });
}
function findExampleSentence(topicKey, phrase){
  return CORPUS.find(s=>s.topicKey===topicKey && s.en.indexOf(phrase)!==-1);
}
function priorityScore(id){
  const st=(progress.stats && progress.stats[id]) || {wrong:0,right:0};
  return st.wrong*3 - st.right;
}
function recordStat(id, ok){
  if(typeof id!=="number") return;
  if(!progress.stats) progress.stats={};
  if(!progress.stats[id]) progress.stats[id]={wrong:0,right:0};
  if(ok) progress.stats[id].right++; else progress.stats[id].wrong++;
}

function getPool(){
  if(session.isMistakeMode){
    return (progress.mistakeIds||[]).map(id=>corpusById[id]).filter(Boolean)
      .sort((a,b)=>priorityScore(b.id)-priorityScore(a.id));
  }
  if(session.mode==="vocab") return vocabPoolForDay(session.day);
  if(session.mode==="build") return buildPoolForDay(session.day);
  if(session.mode==="critical") return criticalPoolForDay(session.day);
  return DAY_POOLS[session.day]||[];
}

function startSession(day, isMistakeMode){
  reportOpen=false;
  if(day!==undefined) session.day=day;
  if(isMistakeMode!==undefined) session.isMistakeMode=isMistakeMode;
  progress.currentDay=session.day;
  saveProgress();

  const pool=getPool();
  let items = session.isMistakeMode ? pool.slice() : pool.filter(s=>!progress.masteredIds[s.id]);
  session.queue=items.map(s=>({...s}));
  session.total=session.queue.length;
  session.correct=0; session.wrong=0; session.answered=false;

  renderDayStrip();
  renderModeTabs();
  renderStats();
  nextQuestion();
}

function markMastered(id){
  progress.masteredIds[id]=true;
  progress.mistakeIds=(progress.mistakeIds||[]).filter(x=>x!==id);
  saveProgress();
}
function markMistake(id){
  if(typeof id!=="number") return;
  if(!progress.mistakeIds) progress.mistakeIds=[];
  if(!progress.mistakeIds.includes(id)) progress.mistakeIds.push(id);
  saveProgress();
}

function nextQuestion(){
  session.answered=false;
  if(session.queue.length===0){
    renderDone();
    renderSessionBar();
    return;
  }
  session.current=session.queue.shift();
  session.extra=prepareExtra(session.current);
  renderCard();
  renderSessionBar();
}

function requeueWrong(item){
  const pos=Math.min(3, session.queue.length);
  session.queue.splice(pos,0,item);
}

function prepareExtra(sentence){
  if(session.mode==="mc"){
    const sameTopic=CORPUS.filter(s=>s.topicKey===sentence.topicKey && s.id!==sentence.id);
    const pool=sameTopic.length>=3?sameTopic:CORPUS.filter(s=>s.id!==sentence.id);
    const shuffled=pool.slice().sort(()=>Math.random()-0.5).slice(0,3);
    const options=[sentence, ...shuffled].sort(()=>Math.random()-0.5);
    return {options};
  }
  if(session.mode==="cloze"){
    const words=sentence.en.match(/[A-Za-z']+/g)||[];
    const candidates=words.filter((w,idx)=>idx>0 && w.length>=4);
    const pick = candidates.length? candidates[sentence.id % candidates.length] : words[words.length-1];
    const re=new RegExp("\\b"+escapeRegExp(pick)+"\\b");
    const blanked=sentence.en.replace(re, "_____");
    return {answer:pick, blanked};
  }
  if(session.mode==="scramble"){
    const tokens=sentence.en.split(" ");
    const shuffled=tokens.map((t,i)=>({t,i})).sort(()=>Math.random()-0.5);
    return {tokens:shuffled, order:tokens, placed:[]};
  }
  if(session.mode==="vocab" || session.mode==="build"){
    return {example: findExampleSentence(sentence.topicKey, sentence.phrase)};
  }
  if(session.mode==="critical"){
    return {};
  }
  return null;
}

        <div class="card-actions">
          <button class="icon-btn" id="speakBtn" title="朗读">🔊</button>
          <button class="btn ghost" id="revealRefBtn">查看参考例句</button>
          <button class="btn ghost" id="skipBtn">跳过</button>
        </div>
        <div class="self-assess" id="selfAssess" style="display:none;">
          <button class="btn ghost" id="notYetBtn">🔁 还需打磨</button>
          <button class="btn primary" id="gotItBtn">✅ 遣词到位</button>
        </div>
      </div>`;
  } else if(session.mode==="critical"){
    bodyHtml=`
      <div class="prompt-label">思辨表达 · ${topicZh}</div>
      <div class="prompt-text">${s.en}</div>
      <div class="prompt-sub">${s.zh}</div>
      <div class="answer-area">
        <textarea class="text-input" id="freeInput" rows="4" placeholder="Share your view in English..."></textarea>
        <div id="revealBox"></div>
        <div class="card-actions">
          <button class="icon-btn" id="speakBtn" title="朗读">🔊</button>
          <button class="btn ghost" id="revealRefBtn">查看参考角度</button>
          <button class="btn ghost" id="skipBtn">跳过</button>
        </div>
        <div class="self-assess" id="selfAssess" style="display:none;">
          <button class="btn ghost" id="notYetBtn">🔁 还需打磨</button>
          <button class="btn primary" id="gotItBtn">✅ 表达自然</button>
        </div>
      </div>`;
  }

  wrap.innerHTML=`
    <div class="ticket">
      <div class="ticket-stub">
        <div class="stub-top mono">${idxLabel}</div>
        <div class="stub-topic">${topicZh}</div>
        <div class="stub-progress mono">${Math.max(0,doneCount)}/${session.total}</div>
      </div>
      <div class="ticket-body">${bodyHtml}</div>
    </div>`;

  attachCardEvents();
}

function bindSelfAssess(){
  const gotIt=document.getElementById("gotItBtn");
  const notYet=document.getElementById("notYetBtn");
  if(gotIt) gotIt.onclick=()=>{ if(session.answered) return; handleResult(true); nextQuestion(); };
  if(notYet) notYet.onclick=()=>{ if(session.answered) return; handleResult(false); nextQuestion(); };
}

function attachCardEvents(){
  const speakText = (session.mode==="vocab"||session.mode==="build") ? session.current.phrase
    : (session.mode==="critical" ? session.current.en : session.current.en);
  const speakBtn=document.getElementById("speakBtn");
  if(speakBtn) speakBtn.onclick=()=>speak(speakText);

  const skipBtn=document.getElementById("skipBtn");
  if(skipBtn) skipBtn.onclick=()=>{ if(!session.isMistakeMode) markMistake(session.current.id); nextQuestion(); };

  if(session.mode==="vocab"){
    const card=document.getElementById("vocabCard");
    const back=document.getElementById("vocabBack");
    const assess=document.getElementById("selfAssess");
    card.onclick=()=>{ back.classList.toggle("show"); assess.style.display="flex"; };
    bindSelfAssess();
  }

  if(session.mode==="build" || session.mode==="critical"){
    const revealBtn=document.getElementById("revealRefBtn");
    const assess=document.getElementById("selfAssess");
    revealBtn.onclick=()=>{
      const box=document.getElementById("revealBox");
      if(session.mode==="build"){
        const ex=session.extra.example;
        box.innerHTML = ex ? `<div class="correct-reveal">参考例句：<b>${ex.en}</b><br>${ex.zh}</div>` : `<div class="correct-reveal">暂时没有匹配的参考例句，对照释义自己检查一下语法和用词吧。</div>`;
      } else {
        box.innerHTML = `<div class="correct-reveal">参考角度：${session.current.model}</div>`;
      }
      assess.style.display="flex";
    };
    bindSelfAssess();
  }

  if(session.mode==="translate" || session.mode==="cloze"){
    const input=document.getElementById("answerInput");
    const actionBtn=document.getElementById("actionBtn");
    input.focus();
    const check=()=>{
      if(session.answered){ nextQuestion(); return; }
      const target = session.mode==="cloze" ? session.extra.answer : session.current.en;
      const ok = norm(input.value)===norm(target);
      handleResult(ok);
      input.classList.add(ok?"correct":"wrong");
      input.disabled=true;
      actionBtn.textContent="下一题";
      showReveal(ok);
    };
    actionBtn.onclick=check;
    input.addEventListener("keydown",e=>{ if(e.key==="Enter") check(); });
  }

  if(session.mode==="mc"){
    document.querySelectorAll("#mcGrid .mc-opt").forEach(opt=>{
      opt.onclick=()=>{
        if(session.answered) return;
        const chosenId=+opt.dataset.id;
        const ok=chosenId===session.current.id;
        handleResult(ok);
        document.querySelectorAll("#mcGrid .mc-opt").forEach(o=>{
          if(+o.dataset.id===session.current.id) o.classList.add("correct");
          else if(o===opt) o.classList.add("wrong");
        });
        showReveal(ok);
        const wrap=document.getElementById("ticketWrap");
        const actions=wrap.querySelector(".card-actions");
        if(!document.getElementById("actionBtn")){
          const btn=document.createElement("button");
          btn.className="btn primary"; btn.id="actionBtn"; btn.textContent="下一题";
          btn.onclick=()=>nextQuestion();
          actions.insertBefore(btn, actions.firstChild.nextSibling);
        }
      };
    });
  }

  if(session.mode==="scramble"){
    const answerBox=document.getElementById("scrambleAnswer");
    const tokensBox=document.getElementById("scrambleTokens");
    const actionBtn=document.getElementById("actionBtn");
    const undoBtn=document.getElementById("undoBtn");
    const renderPlaced=()=>{
      answerBox.innerHTML=session.extra.placed.map(p=>`<div class="token placed">${p.t}</div>`).join("");
    };
    tokensBox.querySelectorAll(".token").forEach(tok=>{
      tok.onclick=()=>{
        if(session.answered) return;
        const i=+tok.dataset.i;
        if(tok.classList.contains("used")) return;
        tok.classList.add("used");
        session.extra.placed.push(session.extra.tokens[i]);
        renderPlaced();
      };
    });
    undoBtn.onclick=()=>{
      if(session.answered || session.extra.placed.length===0) return;
      const last=session.extra.placed.pop();
      renderPlaced();
      tokensBox.querySelectorAll(".token").forEach(tok=>{
        if(+tok.dataset.i===last.i) tok.classList.remove("used");
      });
    };
    actionBtn.onclick=()=>{
      if(session.answered){ nextQuestion(); return; }
      const built=session.extra.placed.map(p=>p.t).join(" ");
      const ok=built===session.extra.order.join(" ");
      handleResult(ok);
      answerBox.style.borderColor = ok?"var(--mint)":"var(--coral)";
      actionBtn.textContent="下一题";
      showReveal(ok);
    };
  }
}

function showReveal(ok){
  const box=document.getElementById("revealBox");
  if(!box) return;
  if(ok){
    box.innerHTML=`<div class="correct-reveal">✅ <b>正确！</b> ${session.current.en}</div>`;
  }else{
    box.innerHTML=`<div class="correct-reveal">正确答案：<b>${session.current.en}</b><br>${session.current.zh}</div>`;
  }
}

function handleResult(ok){
  session.answered=true;
  recordStat(session.current.id, ok);
  if(session.mode==="build") progress.buildCount=(progress.buildCount||0)+1;
  if(session.mode==="critical") progress.criticalCount=(progress.criticalCount||0)+1;
  if(ok){
    session.correct++;
    markMastered(session.current.id);
  }else{
    session.wrong++;
    if(!session.isMistakeMode) markMistake(session.current.id);
    else { session.queue.push({...session.current}); }
    if(!session.isMistakeMode) requeueWrong({...session.current});
  }
  saveProgress();
  renderStats();
  renderDayStrip();
}

function speak(text){
  try{
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang="en-US"; u.rate=0.95;
    window.speechSynthesis.speak(u);
  }catch(e){}
}

function renderSessionBar(){
  const done=session.total - session.queue.length - (session.answered?0:1);
  const pct = session.total? Math.min(100, Math.max(0,(done/session.total)*100)) : 100;
  document.getElementById("progressFill").style.width=pct+"%";
  document.getElementById("sessionCount").textContent=`${Math.max(0,done)}/${session.total}`;
}

function renderDone(){
  const wrap=document.getElementById("ticketWrap");
  const pool=getPool();
  const label = session.isMistakeMode ? "错题本" : `第 ${session.day} 天`;
  wrap.innerHTML=`
    <div class="done-panel">
      <h2>🎉 ${label}已全部掌握</h2>
      <p>本轮共 ${pool.length} 句，正确 ${session.correct} 次 · 重练 ${session.wrong} 次。切换下一天，或重练巩固一下。</p>
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">
        <button class="btn primary" id="nextDayBtn">前往下一天 →</button>
        <button class="btn ghost" id="redoBtn">再练一轮</button>
      </div>
    </div>`;
  const nextBtn=document.getElementById("nextDayBtn");
  if(nextBtn) nextBtn.onclick=()=>{
    if(session.isMistakeMode){ startSession(session.day,false); }
    else { startSession(Math.min(TOTAL_DAYS, session.day+1), false); }
  };
  const redoBtn=document.getElementById("redoBtn");
  if(redoBtn) redoBtn.onclick=()=>{
    session.queue=pool.map(s=>({...s}));
    session.total=session.queue.length; session.correct=0; session.wrong=0;
    nextQuestion();
  };
}

function countByPrefix(prefix){
  return Object.keys(progress.masteredIds||{}).filter(k=>k.indexOf(prefix)===0).length;
}

function renderReport(){
  const wrap=document.getElementById("ticketWrap");
  const rows=TOPICS.map(t=>{
    const pool=CORPUS.filter(s=>s.topicKey===t.key);
    const mastered=pool.filter(s=>progress.masteredIds[s.id]).length;
    const pct=pool.length?Math.round(mastered/pool.length*100):0;
    return {name:t.name.zh, mastered, total:pool.length, pct};
  }).sort((a,b)=>a.pct-b.pct);

  const mistakes=progress.mistakeIds||[];
  const stats=progress.stats||{};
  const high=mistakes.filter(id=>((stats[id]&&stats[id].wrong)||0)>=3).length;
  const med=mistakes.filter(id=>((stats[id]&&stats[id].wrong)||0)===2).length;
  const low=Math.max(0, mistakes.length-high-med);

  const vocabTotal=TOPICS.length*8;
  const vocabMastered=countByPrefix("vocab:");
  const buildDone=progress.buildCount||0;
  const criticalTotal=TOPICS.length;
  const criticalDone=countByPrefix("critical:");
  const sentenceMastered=Object.keys(progress.masteredIds||{}).filter(k=>!isNaN(k)).length;

  const rowsHtml=rows.map(r=>`
    <div class="report-row">
      <div class="report-name">${r.name}</div>
      <div class="report-track"><div class="report-fill" style="width:${r.pct}%"></div></div>
      <div class="report-pct mono">${r.mastered}/${r.total}</div>
    </div>`).join("");

  wrap.innerHTML=`
    <div class="report-panel">
      <h2>📊 训练报告</h2>
      <div class="sub">按场景追踪句子掌握度，按错误频次给错题排优先级，同时看重点词汇 / 造句 / 思辨的练习进度</div>

      <div class="report-block">
        <h3>总览</h3>
        <div class="report-summary">
          <div class="report-chip"><div class="num mono">${sentenceMastered}</div><div class="lbl">句子已掌握</div></div>
          <div class="report-chip"><div class="num mono">${vocabMastered}/${vocabTotal}</div><div class="lbl">重点词汇已记住</div></div>
          <div class="report-chip"><div class="num mono">${buildDone}</div><div class="lbl">造句练习次数</div></div>
          <div class="report-chip"><div class="num mono">${criticalDone}/${criticalTotal}</div><div class="lbl">思辨题已掌握</div></div>
        </div>
      </div>

      <div class="report-block">
        <h3>错题优先级
          <span class="priority-tag priority-high">高优先 ${high}</span>
          <span class="priority-tag priority-med">中优先 ${med}</span>
          <span class="priority-tag priority-low">低优先 ${low}</span>
        </h3>
        <div class="sub" style="margin-bottom:0;">点底部"优先错题本"时，系统会自动把错得最多的句子排到最前面优先复习。</div>
      </div>

      <div class="report-block">
        <h3>按场景掌握度（由弱到强排序，最需要加强的排最前）</h3>
        ${rowsHtml}
      </div>

      <div class="card-actions">
        <button class="btn primary" id="backBtn">← 返回练习</button>
      </div>
    </div>`;

  document.getElementById("backBtn").onclick=()=>{
    reportOpen=false;
    if(session.current) renderCard();
    else if(session.queue.length) nextQuestion();
    else renderDone();
    renderSessionBar();
  };
}

/* ============ 8. 事件绑定 ============ */
document.getElementById("dayStrip").addEventListener("click",e=>{
  const chip=e.target.closest(".day-chip");
  if(!chip) return;
  startSession(+chip.dataset.day, false);
});
document.getElementById("modeTabs").addEventListener("click",e=>{
  const tab=e.target.closest(".mode-tab");
  if(!tab) return;
  session.mode=tab.dataset.mode;
  progress.currentMode=session.mode;
  saveProgress();
  renderModeTabs();
  startSession(session.day, session.isMistakeMode);
});
document.getElementById("mistakeBtn").addEventListener("click",()=>{
  startSession(session.day, !session.isMistakeMode);
});
document.getElementById("resetBtn").addEventListener("click",()=>{
  const pool=getPool();
  pool.forEach(s=>{ delete progress.masteredIds[s.id]; });
  saveProgress();
  startSession(session.day, session.isMistakeMode);
});
document.getElementById("reportBtn").addEventListener("click",()=>{
  reportOpen=true;
  renderReport();
});

/* ============ 9. 初始化 ============ */
(async function init(){
  progress=await loadProgress();
  if(!progress.masteredIds) progress.masteredIds={};
  if(!progress.mistakeIds) progress.mistakeIds=[];
  if(!progress.stats) progress.stats={};
  if(!progress.buildCount) progress.buildCount=0;
  if(!progress.criticalCount) progress.criticalCount=0;
  touchStreak();
  session.day=progress.currentDay||1;
  session.mode=progress.currentMode||"translate";
  renderModeTabs();
  startSession(session.day, false);
})();
</script>
</body>
</html>
